version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: vocalendar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vocalendar
      POSTGRES_USER: vocalendar
      POSTGRES_PASSWORD: vocalendar
    ports:
      - "5432:5432"
    volumes:
      - vocalendar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocalendar -d vocalendar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: vocalendar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vocalendar-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vocalendar-postgres-data:
  vocalendar-redis-data:
